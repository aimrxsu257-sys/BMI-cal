<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>โปรแกรมคำนวณ BMI</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>คำนวณค่าดัชนีมวลกาย (BMI)</h1>
        <div class="input-group">
            <label for="weight">น้ำหนัก (กก.):</label>
            <input type="number" id="weight" placeholder="ตัวอย่าง: 65">
        </div>
        <div class="input-group">
            <label for="height">ส่วนสูง (ซม.):</label>
            <input type="number" id="height" placeholder="ตัวอย่าง: 170">
        </div>
        <button onclick="calculateBMI()">คำนวณ</button>

        <div id="result" class="result-box" style="display:none;">
            <h2>ผลลัพธ์ของคุณ</h2>
            <p id="bmi-value"></p>
            <p id="bmi-status"></p>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
